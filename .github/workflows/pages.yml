name: Deploy tester build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run automated validation
        run: npm run check

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare playable artifact only
        shell: bash
        run: |
          mkdir -p _site/assets/audio _site/assets/images/ingredients _site/assets/images/potions
          cp index.html style.css game-logic.js platform-adapters.js audio-feedback.js app.js manifest.webmanifest icon.svg service-worker.js _site/
          cp assets/audio/bagpop.mp3 assets/audio/brew-ready.mp3 assets/audio/brew-start.mp3 assets/audio/coin.mp3 assets/audio/confirm.mp3 assets/audio/gather.mp3 assets/audio/levelup.ogg assets/audio/tap.ogg _site/assets/audio/
          cp assets/audio/music1.mp3 assets/audio/music2.mp3 assets/audio/music3.mp3 _site/assets/audio/
          cp assets/images/ingredients/frostmint.png _site/assets/images/ingredients/
          cp assets/images/potions/aurora-nectar.png assets/images/potions/aurora-nectar-animated-12f.png assets/images/potions/lantern-sip.png assets/images/potions/quietbell-tea.png assets/images/potions/wayfinder-cordial.png _site/assets/images/potions/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
